<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log - TrackIt</title>
    <link rel="stylesheet" href="Log.css">
    <script src="Log.js"></script>   
</head>
<body>
    <div id="header">
        <div id="name">
            <h1>Track-It</h1>
        </div>
        <a href="log.html" id="Log" style="text-decoration: none; color: inherit;">
            <h1>Log</h1>
        </a>
        <a href="streak.html" id="Streak" style="text-decoration: none; color: inherit;">
            <h1>Streak</h1>
        </a>
    </div>
    <div id="space"></div>
    <div id="logbuttons">
        <div class='logb' id="sleep">
            <h3>Sleep............ </h3>
            <input id="sleepinput" type="number">
        </div>
        <div class='logb' id="steps">
            <h3>Steps.......</h3>
            <input id="stepsinput" type="number">
        </div>
        <div class='logb' id="gym">
            <h3>Gym...................</h3>
            <input id="gyminput" type="checkbox">
        </div>
        <div class='logb' id="development">
            <h3>Development........</h3>
            <input id="devinput" type="checkbox">
        </div>
        <div class='logb' id="submit">
            <h2>Submit</h2>
        </div>
    </div>
</body>
</html>
